window.uploadToFirestore = async function(occData) {

  const entries = Object.entries(occData);

    lastUpdated: new Date().toISOString(),
    uploadedBy: "admin"
  });
};

  }
  document.getElementById("admin-panel").style.display = "block";
};

window.handleExcelUpload = async function(input) {
  const file = input.files[0];
  if (!file) return;
  const statusEl = document.getElementById("upload-status");
  statusEl.textContent = "⏳ 讀取中...";
  statusEl.style.color = "#8b6f47";

  try {
    const XLSX = window.XLSX;
    const data = await file.arrayBuffer();
    const wb = XLSX.read(data);
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, {header: 1});

    const newOD = {};
    let count = 0;
    for (let i = 6; i < rows.length; i++) {
      const row = rows[i];
      if (!row[0]) continue;
      const dateStr = String(row[0]).trim();
      if (!/^202[6-9]\d{4}$/.test(dateStr)) continue;
      const y = dateStr.slice(0,4), m = dateStr.slice(4,6), d = dateStr.slice(6,8);
      const key = y + "-" + m + "-" + d;
      const occ = parseFloat(row[3]);
      const rev = parseFloat(row[8]);
      if (!isNaN(occ) && !isNaN(rev)) {
        newOD[key] = [occ, rev];
        count++;
      }
    }

    if (count === 0) {
      statusEl.textContent = "❌ 找不到資料，請確認 Excel 格式";
      statusEl.style.color = "#e74c3c";
      return;
    }

    statusEl.textContent = "⬆️ 上傳中...";
    await window.uploadToFirestore(newOD);
    Object.assign(window.OD, newOD);
    window.render();
    statusEl.textContent = "✅ 成功更新 " + count + " 筆資料！";
    statusEl.style.color = "#27ae60";
    input.value = "";
  } catch(e) {
    statusEl.textContent = "❌ 錯誤：" + e.message;
    statusEl.style.color = "#e74c3c";
    console.error(e);
  }
};

// Init
loadFirestoreOCC();
</script>

  <p style="font-size:12px;color:#8b6f47;margin-bottom:12px;line-height:1.6">上傳 Excel 後自動儲存至雲端，<br>所有人開網頁都會看到最新資料。</p>
  <label style="display:block;background:#2c1810;color:#fdf6ec;text-align:center;padding:10px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;letter-spacing:1px">

    <input type="file" accept=".xlsx,.xls" onchange="handleExcelUpload(this)" style="display:none">
